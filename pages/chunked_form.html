<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chunked Request Form</title>
</head>
<body>
    <form id="chunkedForm">
        <input type="text" name="data1" placeholder="First data chunk">
        <input type="text" name="data2" placeholder="Second data chunk">
        <input type="text" name="data3" placeholder="Third data chunk">
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById('chunkedForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Empêche l'envoi standard du formulaire

            const formData = new FormData(this);
            const chunks = [];

            // Créer les chunks de données
            for (const [key, value] of formData.entries()) {
                const chunk = `${value.length.toString(16)}\r\n${value}\r\n`;
                chunks.push(chunk);
            }
            chunks.push("0\r\n\r\n"); // Fin des chunks

            const body = new ReadableStream({
                start(controller) {
                    chunks.forEach(chunk => controller.enqueue(new TextEncoder().encode(chunk)));
                    controller.close();
                }
            });

            // Envoyer la requête en chunks avec l'API Fetch
            fetch('http://localhost:8080/upload', {
                method: 'POST',
                headers: {
                    'Transfer-Encoding': 'chunked',
                    'Content-Type': 'text/plain'
                },
                body: body
            })
            .then(response => response.text())
            .then(data => console.log(data))
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
