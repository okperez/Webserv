server
{
	server_name example.com;
    listen 8080;
    listen 8082;
    host 127.0.0.1;
	server_name 127.0.0.2;
	client_max_body_size 100000;
	
	location / {
		index homepage.html;
		# allow_methods GET POST ATT;
		autoindex on;

		upload_dir upload;
		root pages;
		# return 308 www/homepage.html;
	}

	location /cgi-bin {
		# allow_methods GET POST;
		root cgi_script;					
        cgi_extension php py pl;
	}

	location /lol {
		return 301 anywhere.html;
	}

	location /www {
		root /www;
		index site_index.html;
		autoindex on;
		# allow_methods GET POST;
	}

	# location = /lol {
	# 	return 301 homepage.html;
    # }

	location /listFiles {
		# allow_methods GET POST;
		root ./;
	}

	location /downloads {
		# allow_methods DELETE;
		root pages/downloads;
	}

    error_page {
	
        404 pages/error_pages/error_404.html;
        403 pages/error_pages/error_403.html;
    }
}

